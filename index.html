<!DOCTYPE html>
<html>
<head>
  <title>Woodstone CRM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: Arial; padding:20px;">

<h1>Woodstone CRM</h1>

<input id="jobName" placeholder="Job Name">
<input id="clientName" placeholder="Client">
<input id="price" placeholder="Sell Price (ex VAT)">
<button onclick="addJob()">Add Job</button>

<h2>Jobs</h2>
<div id="jobs"></div>

<script>

// 🔴 YOU WILL REPLACE THESE NEXT STEP
const supabaseUrl = "https://rjgvpbuflezpfcgniezo.supabase.co"
const supabaseKey = "sb_publishable_scxePgZ6Yh4a4GPSEttI1g_TBUD9u0m"

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function addJob() {
  const name = document.getElementById("jobName").value;
  const client = document.getElementById("clientName").value;
  const price = document.getElementById("price").value;

  await supabase.from("jobs").insert([
    { project_name: name, client_name: client, sell_price_ex_vat: price }
  ]);

  loadJobs();
}

async function loadJobs() {
  const { data } = await supabase.from("jobs").select("*");

  const container = document.getElementById("jobs");
  container.innerHTML = "";

  data.forEach(job => {
    container.innerHTML += `<p>${job.project_name} - ${job.client_name} - €${job.sell_price_ex_vat}</p>`;
  });
}

loadJobs();

</script>

</body>
</html>
